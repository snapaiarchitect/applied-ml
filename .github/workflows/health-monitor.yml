name: Health Monitor

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  check-all-repos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check all portfolio repo CI status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repos = [
              'gosidehustlesisi/sierra-applied-ml',
              'gosidehustlesisi/sierra-healthcare-analytics',
              'gosidehustlesisi/sierra-pmo-analytics',
              'gosidehustlesisi/sierra-genai-engineering',
              'gosidehustlesisi/sierra-mobility-data',
              'gosidehustlesisi/sierra-data-governance',
              'gosidehustlesisi/sierra-public-sector-insights'
            ];
            
            const results = [];
            for (const repo of repos) {
              const [owner, name] = repo.split('/');
              try {
                const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner,
                  repo: name,
                  per_page: 1
                });
                const latest = runs.workflow_runs[0];
                results.push({
                  repo,
                  status: latest?.conclusion || latest?.status || 'unknown',
                  run_id: latest?.id,
                  html_url: latest?.html_url
                });
              } catch (e) {
                results.push({ repo, status: 'error', error: e.message });
              }
            }
            
            const failed = results.filter(r => r.status === 'failure' || r.status === 'error');
            
            console.log('=== Portfolio Health Check ===');
            console.table(results);
            
            if (failed.length > 0) {
              console.log(`⚠️ ${failed.length} repos have failed CI:`);
              failed.forEach(f => console.log(`  - ${f.repo}: ${f.status}`));
              
              // Create issue if any failed
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 CI Failure Detected: ${failed.length} repos`,
                body: failed.map(f => `- **${f.repo}**: [View run](${f.html_url})`).join('
') + 
                      '

Auto-generated by Health Monitor workflow.',
                labels: ['ci-failure', 'auto-generated']
              });
            } else {
              console.log('✅ All repos green');
            }
            
            // Write summary
            const fs = require('fs');
            fs.writeFileSync('health-report.json', JSON.stringify(results, null, 2));
      
      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: health-report.json
          retention-days: 7

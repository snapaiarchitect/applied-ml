version: '3.8'
services:
  predictive-maintenance:
    build: .
    command: streamlit run projects/predictive-maintenance-transit/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  nlp-classification:
    build: .
    command: streamlit run projects/nlp-text-classification-pipeline/dashboard.py --server.port=8502 --server.address=0.0.0.0
    ports:
      - "8502:8502"
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  demand-forecasting:
    build: .
    command: streamlit run projects/demand-forecasting-operations/dashboard.py --server.port=8503 --server.address=0.0.0.0
    ports:
      - "8503:8503"
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8503/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
